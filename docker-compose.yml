version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: manufacturing_db
    environment:
      POSTGRES_DB: manufacturing_dashboard
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHEEP", "pg_isready", "-U", "admin", "-d", "manufacturing_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manufacturing_backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin123@db:5432/manufacturing_dashboard
      - DATABASE_URL_SYNC=postgresql://admin:admin123@db:5432/manufacturing_dashboard
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - APP_ENV=development
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manufacturing_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
